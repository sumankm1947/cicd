# ---------------------------------------------------------------------------
# LAB 9 (Part B) — a COMPOSITE ACTION: a reusable bundle of STEPS.
# A composite action packages a group of steps you drop into an existing job
# with a STEP-level `uses:`. Contrast with a reusable workflow, which packages
# whole JOBS and is called at the JOB level. This is our shared "set up the
# Python env" block, written once and reused from BOTH the `lint` job (ci.yml)
# and the reusable test workflow (reusable-tests.yml).
#
# GOTCHA — there is NO checkout step in here on purpose. A LOCAL action
# (`uses: ./...`) is just files in the repo, so the repo must ALREADY be
# checked out before the runner can even find this action.yml. That means every
# CALLER must run actions/checkout FIRST; a composite action cannot check out
# the very repo that contains it (chicken-and-egg).
# ---------------------------------------------------------------------------
name: Setup Python environment
description: Set up Python, restore the pip cache, and install dependencies.

# Composite actions take typed `inputs:` (the action's "parameters").
inputs:
  python-version:
    description: Python version to install
    required: true

runs:
  using: composite            # <-- this is what makes it a COMPOSITE action
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}   # read the input

    - name: Cache pip downloads
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ inputs.python-version }}-

    - name: Install dependencies
      shell: bash             # GOTCHA: composite `run:` steps MUST declare a shell
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt